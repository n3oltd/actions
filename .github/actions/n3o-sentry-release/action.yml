name: 'N3O Sentry release'
description: creates a Sentry release for the n3oltd org and optionally uploads sourcemaps

inputs:
  project:
    description: Sentry project slug
    required: true
  release:
    description: release version/identifier to create
    required: true
  environment:
    description: Sentry environment name to associate the release with
    required: false
    default: ''
  sourcemaps:
    description: path to the sourcemaps to upload
    required: false
    default: ''
  auth-token:
    description: Sentry auth token
    required: true

runs:
  using: 'composite'
  steps:
    - name: Sentry release
      uses: getsentry/action-release@v3
      env:
        SENTRY_ORG: n3oltd
        SENTRY_PROJECT: ${{ inputs.project }}
        SENTRY_AUTH_TOKEN: ${{ inputs.auth-token }}
      with:
        release: ${{ inputs.release }}
        environment: ${{ inputs.environment }}
        sourcemaps: ${{ inputs.sourcemaps }}
        # At build time (no environment), the runner is in the source repo,
        # so set_commits=auto walks its git log and registers the repo entry.
        # At deploy time, the runner is in the deployments repo — auto would
        # attribute the wrong commits, so skip.
        set_commits: ${{ inputs.environment == '' && 'auto' || 'skip' }}
        ignore_missing: true
        ignore_empty: true
        disable_telemetry: true
