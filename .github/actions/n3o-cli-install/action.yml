name: n3o-cli install
description: Installs the n3o-cli tool

inputs:
  access-token:
    description: access token for the nuget source
    required: true
  azure-client-id:
    description: Azure client id for key vault access
    required: true
  azure-client-secret:
    description: Azure client secret for key vault access
    required: true
  azure-tenant-id:
    description: Azure tenant id for key vault access
    required: true

runs:
  using: "composite"
  steps:
    - name: dotnet tool install n3o
      env:
        GH_USERNAME: n3oltd
        GH_PAT: ${{ inputs.access-token }}
        AZURE_CLIENT_ID: ${{ inputs.azure-client-id }}
        AZURE_CLIENT_SECRET: ${{ inputs.azure-client-secret }}
        AZURE_TENANT_ID: ${{ inputs.azure-tenant-id }}
      shell: bash
      run: |
        if ! dotnet nuget list source 2>/dev/null | grep -qi 'nuget.pkg.github.com/n3oltd'; then
          dotnet nuget add source https://nuget.pkg.github.com/n3oltd/index.json --name n3oltd --username "$GH_USERNAME" --password "$GH_PAT" --store-password-in-clear-text
        fi
        dotnet tool install --global --no-cache n3o
        echo "$HOME/.dotnet/tools" >> "$GITHUB_PATH"
