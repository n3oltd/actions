name: dotnet-pack
description: Create NuGet packages

inputs:
  build-configuration:
    description: The build configuration to run
    default: Release

  projects:
    description: The list of projects to pack as a JSON array
    required: true

  set-assembly-version:
    description: Whether to set AssemblyVersion and FileVersion to match the package version
    default: 'false'

  version-suffix:
    description: The suffix to add to the package version
    default: ''

  working-directory:
    description: "The working directory"
    default: src

runs:
  using: "composite"
  steps: 
    - name: dotnet-pack
      shell: bash
      run: |
        version=$(date +"%Y.%m.%d").${{ github.run_number }}
        if [ "${{ inputs.version-suffix }}" != "" ];then
          version=$version-${{ inputs.version-suffix }}
        fi
        projects=$(echo '${{ inputs.projects }}' | jq -c -r '.[]')
        for project in $projects
        do
          echo "Packing: $project"
          csProj=$(find . -path \*$project/$project.csproj)
          assembly_version_args=""
          if [ "${{ inputs.set-assembly-version }}" = "true" ]; then
            assembly_version_args="/p:AssemblyVersion=$version /p:FileVersion=$version"
          fi
          # --no-build must NOT be used here: dotnet pack must rebuild the DLL so that
          # /p:AssemblyVersion and /p:FileVersion are baked into the binary. Using --no-build
          # only updates the .nuspec metadata and leaves the DLL at its default version (1.0.0.0)
          dotnet pack --configuration "${{inputs.build-configuration}}" --no-restore "$csProj" /p:PackageVersion=$version $assembly_version_args
        done
