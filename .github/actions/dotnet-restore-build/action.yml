name: dotnet-restore-build
description: Restore and build

inputs:
  access-token:
    description: A valid PAT with suitable permissions
    required: true
    
  build-configuration:
    description: The build configuration to run
    default: Release
  
  working-directory:
    description: "The working directory"
    default: src

runs:
  using: "composite"
  steps:
    # GitHub-hosted runners only; the ephemeral self-hosted fleet has no package cache (restores fresh each job).
    - name: cache nuget packages
      if: runner.environment == 'github-hosted'
      uses: actions/cache@v6
      with:
        path: ~/.nuget/packages
        key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
        restore-keys: |
          nuget-${{ runner.os }}-

    - name: dotnet build
      shell: bash
      working-directory: ${{github.workspace}}/${{ inputs.working-directory }}
      env:
        GH_USERNAME: n3oltd
        GH_PAT: ${{ inputs.access-token }}
      run: |
        dotnet build -c "${{inputs.build-configuration}}"
