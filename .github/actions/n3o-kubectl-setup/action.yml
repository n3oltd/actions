name: kubectl-setup
description: Install and configure kubectl for AKS

inputs:
  access-token: 
    description: A valid PAT with suitable permissions
    required: true

  azure-credentials:
    description: Azure Credentials
    required: true

  resource-group:
    description: Azure Resource Group
    required: true

runs:
  using: "composite"
  steps:
    # Baked into the fleet image; install only where missing.
    - name: check kubectl
      id: kubectl
      shell: bash
      run: command -v kubectl >/dev/null 2>&1 && echo "present=true" >> "$GITHUB_OUTPUT" || echo "present=false" >> "$GITHUB_OUTPUT"

    - name: install kubectl
      if: steps.kubectl.outputs.present != 'true'
      uses:  azure/setup-kubectl@v5
      with:
        version: 'latest'

    - name: azure login
      uses: azure/login@v3
      with:
        creds: '${{ inputs.azure-credentials }}'

    # Baked into the fleet image; install only where missing.
    - name: check kubelogin
      id: kubelogin
      shell: bash
      run: command -v kubelogin >/dev/null 2>&1 && echo "present=true" >> "$GITHUB_OUTPUT" || echo "present=false" >> "$GITHUB_OUTPUT"

    - name: install kubelogin
      if: steps.kubelogin.outputs.present != 'true'
      uses: azure/use-kubelogin@v1.3
      env:
        GITHUB_TOKEN: '${{ inputs.access-token }}'
      with:
        kubelogin-version: 'latest'

    - name: set kubectl context
      uses: azure/aks-set-context@v5
      with:
        resource-group: '${{ inputs.resource-group }}'
        cluster-name: '${{ inputs.resource-group }}-kubernetes'

    - name: convert kubeconfig for kubelogin
      shell: bash
      run: kubelogin convert-kubeconfig -l azurecli
