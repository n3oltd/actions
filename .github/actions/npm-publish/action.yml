name: npm-publish
description: Publishes one or more npm packages

inputs:
  access-token:
    description: A valid PAT with suitable permissions
    required: true

  package-directories:
    description: The list of package directories as a JSON array
    required: true
    
  version-suffix:
    type: string
    description: The Suffix to add to the package version
    required: false
    default: ''

  before-sha:
    description: When set, only packages whose own folder changed since this SHA are published (requires fetch-depth 0)
    required: false
    default: ''

  after-sha:
    description: Current SHA for the change comparison; defaults to HEAD
    required: false
    default: ''

  publish-all:
    description: Publish every listed package regardless of changes (bootstrap/force)
    required: false
    default: 'false'

runs:
  using: "composite"
  steps:      
    - name: npm publish
      shell: bash
      run: |
        version=$(date -u +"%Y.%m.%d")-${{ github.run_number }}
        packageDirectories=$(echo '${{ inputs.package-directories }}' | jq -c -r '.[]')
        after="${{ inputs.after-sha }}"; [ -z "$after" ] && after=HEAD
        for packageDirectory in $packageDirectories
        do
          if [ "${{ inputs.publish-all }}" != "true" ] && [ -n "${{ inputs.before-sha }}" ] && [ "${{ inputs.before-sha }}" != "0000000000000000000000000000000000000000" ]; then
            if git diff --quiet "${{ inputs.before-sha }}" "$after" -- "$packageDirectory"; then
              echo "skip (unchanged): $packageDirectory"; continue
            fi
          fi
          ( cd $packageDirectory;
            if [ "${{ inputs.version-suffix }}" != "" ];then
              npm version $version --preid=${{ inputs.version-suffix }}
            else
              npm version $version;
            fi
            echo "//npm.pkg.github.com/:_authToken=${{ inputs.access-token }}" >> .npmrc;
            echo "@n3oltd:registry=https://npm.pkg.github.com" >> .npmrc;
            name=$(npm pkg get name | tr -d '"')
            effective=$(npm pkg get version | tr -d '"')
            # An already-published version means a rerun after a partial publish: done, not an error.
            if npm view "$name@$effective" version > /dev/null 2>&1; then
              echo "skip (already published): $name@$effective"
            elif [ "${{ inputs.version-suffix }}" != "" ];then
              npm publish --tag=${{ inputs.version-suffix }}
            else
              npm publish --tag=latest
            fi
            # prepack installs a per-package node_modules; across hundreds of packages that fills the disk.
            rm -rf node_modules )
        done
      working-directory: ${{github.workspace}}
      env: 
        NODE_AUTH_TOKEN: ${{inputs.access-token}}     
