name: pick-runner
description: >
  Picks the runner for a job: the self-hosted label when the fleet has idle capacity,
  otherwise a GitHub-hosted fallback. Lets a workflow prefer the self-hosted github-runner
  fleet (n3oltd/devops apps/github-runner) without ever queueing behind a saturated fleet —
  interactive jobs degrade to hosted instead of waiting. Public repos always get the hosted
  fallback (the self-hosted runner group is private-repo only). Use it in a tiny `pick` job
  whose output feeds the real job's `runs-on`, so the capacity logic lives here once instead
  of being copy-pasted into every repo.

inputs:
  token:
    description: >
      Token with "Organization self-hosted runners: read" (e.g. the n3o-babar App token from
      n3o-git-identity). The default GITHUB_TOKEN cannot list org runners.
    required: true
  self-hosted-label:
    description: The self-hosted runner label to prefer.
    required: false
    default: github-runner
  fallback:
    description: The GitHub-hosted runner to fall back to when the fleet has no idle capacity.
    required: false
    default: ubuntu-latest
  org:
    description: Organization that owns the runners.
    required: false
    default: n3oltd

outputs:
  runs-on:
    description: The chosen runs-on value (the self-hosted label or the fallback).
    value: ${{ steps.pick.outputs.runs-on }}

runs:
  using: composite
  steps:
    - id: pick
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.token }}
        SELF_HOSTED: ${{ inputs.self-hosted-label }}
        FALLBACK: ${{ inputs.fallback }}
        ORG: ${{ inputs.org }}
        IS_PRIVATE: ${{ github.event.repository.private }}
      run: |
        choose() { echo "runs-on=$1" >> "$GITHUB_OUTPUT"; echo "picked runner: $1"; }

        # The self-hosted runner group is private-repo only, so public repos can't use it —
        # always send them to the hosted fallback.
        if [ "$IS_PRIVATE" != "true" ]; then
          echo "public repo → hosted fallback"
          choose "$FALLBACK"; exit 0
        fi

        # Count online + idle runners carrying the self-hosted label. On any API hiccup,
        # default to 0 so we fall back to hosted rather than risk queueing.
        idle=$(gh api "orgs/$ORG/actions/runners" --paginate \
          --jq "[.runners[] | select(.status==\"online\" and .busy==false)
                 | select(any(.labels[]; .name==\"$SELF_HOSTED\"))] | length" 2>/dev/null || echo 0)
        echo "idle $SELF_HOSTED runners: ${idle:-0}"

        if [ "${idle:-0}" -ge 1 ]; then choose "$SELF_HOSTED"; else choose "$FALLBACK"; fi
