# Reusable workflow that builds .NET projects, packs the listed NuGet packages and
# pushes them to the feed, optionally publishing generated npm client packages too.
# Use it as the main CI/CD pipeline for releasing a repo's NuGet (and npm) artifacts.
name: dotnet build, pack and push

on:
  workflow_call:
    inputs:
      build-configuration:
        type: string
        description: The build configuration to run
        default: Release
      
      npm-packages:
        description: List of npm package directories as a JSON array
        required: true
        type: string

      nuget-packages:
        description: List of NuGet packages to create as a JSON array
        required: true
        type: string

      set-assembly-version:
        description: Whether to set AssemblyVersion and FileVersion to match the package version
        type: boolean
        default: false

      version-suffix:
        description: optional prerelease suffix appended to the version
        type: string
        default: ''

      working-directory:
        description: directory (relative to the repo root) to run the build/commands in
        type: string
        default: src
        
env:
  GH_PAT: ${{ secrets.GH_PAT }}
  AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v6

      - name: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: setup-node
        if: inputs.npm-packages != ''
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: install n3o cli
        uses: n3oltd/actions/.github/actions/n3o-cli-install@main
        with:
          access-token: ${{ env.GH_PAT }}

      - name: n3o cli prepack
        uses: n3oltd/actions/.github/actions/n3o-cli-prepack@main

      - name: dotnet build
        uses: n3oltd/actions/.github/actions/dotnet-restore-build@main
        with:
          access-token: ${{ env.GH_PAT }}
          build-configuration: ${{ inputs.build-configuration }}
          working-directory: ${{ inputs.working-directory }}

      - name: dotnet pack
        uses: n3oltd/actions/.github/actions/dotnet-pack@main
        with:
          build-configuration: ${{ inputs.build-configuration }}
          projects: ${{ inputs.nuget-packages }}
          set-assembly-version: ${{ inputs.set-assembly-version }}
          version-suffix: ${{ inputs.version-suffix }}
          working-directory: ${{ inputs.working-directory }}

      - name: dotnet push
        uses: n3oltd/actions/.github/actions/dotnet-push@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          projects: ${{ inputs.nuget-packages }}
          working-directory: ${{ inputs.working-directory }}

      - name: npm publish clients packages
        if: inputs.npm-packages != ''
        uses: n3oltd/actions/.github/actions/npm-publish@main
        with:
          package-directories: ${{ inputs.npm-packages }}
          access-token: ${{ secrets.GH_PAT }}
          version-suffix: ${{ inputs.version-suffix }}
