name: 'docker-build-push'

on:
  workflow_call:
    inputs:
      build-args:
        type: string
        required: false
    
      container-repository:
        type: string
        required: true

      dockerfile:
        type: string
        required: true

      working-directory:
        type: string
        default: src

    secrets:
      acr-username:
        required: true

      acr-password:
        required: true

jobs:
  job1:
    name: ubuntu-latest

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - id: buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to ACR
        uses: docker/login-action@v4
        with:
          registry: n3oltd.azurecr.io
          username: ${{ secrets.acr-username }}
          password: ${{ secrets.acr-password }}

      - name: Fetch Dockerfile
        uses: wei/wget@v1
        with:
          args: -O ${{ inputs.dockerfile }} https://raw.githubusercontent.com/n3oltd/actions/main/docker/${{ inputs.dockerfile }}

      - id: meta
        name: Set tags
        run: |
          ACR_REPOSITORY=n3oltd.azurecr.io/${{ inputs.container-repository }}
          NOW=$(date +'%Y-%m-%d')
          VERSION="$NOW.${{ github.run_number }}"
          VERSIONTAG="${ACR_REPOSITORY}:${VERSION}"
          LATESTTAG="${ACR_REPOSITORY}:latest"
          TAGS="${VERSIONTAG},${LATESTTAG}"
          echo "tags=$TAGS" >> $GITHUB_OUTPUT

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./${{ inputs.working-directory }}
          target: final
          file: ${{ inputs.dockerfile }}
          build-args: ${{ inputs.build-args }}
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
