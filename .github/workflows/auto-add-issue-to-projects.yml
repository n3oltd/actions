name: Auto add issue to projects

on:
  workflow_call:

jobs:
  add-issue-to-projects:
    name: Add issue to projects
    if: github.event.action == 'assigned'
    runs-on: ubuntu-latest
    steps:
      - name: Add assignees to their projects
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.AUTOMATION_WORKFLOWS_TOKEN }}
          ASSIGNEES_JSON: ${{ toJson(github.event.issue.assignees) }}
          ISSUE_URL: ${{ github.event.issue.html_url }}
        run: |
          while IFS= read -r login; do
            project_num=$(gh api graphql \
              -f query='query($org:String!,$q:String!){organization(login:$org){projectsV2(query:$q,first:1){nodes{number,title}}}}' \
              -f org=n3oltd \
              -f q="staff/$login" \
              --jq ".data.organization.projectsV2.nodes[] | select(.title == \"staff/$login\") | .number")
            if [ -n "$project_num" ]; then
              gh project item-add "$project_num" --owner n3oltd --url "$ISSUE_URL"
            fi
          done < <(echo "$ASSIGNEES_JSON" | jq -r '.[].login')
