name: 'dotnet-upgrade-nuget-build-commit'

on:
  workflow_call:
    inputs:
      working-directory:
        type: string
        default: src
      
      repos:
        description: List of repos to process
        required: true
        type: string
        
jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'
          
      - name: install n3o cli
        uses: n3oltd/actions/.github/actions/n3o-cli-install@main
        with:
          access-token: ${{ secrets.GH_PAT }}
      
      - name: update-nuget-packages
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
        run: |
          git config --global url."https://x-access-token:${GH_PAT}@github.com/".insteadOf "https://github.com/"

          repos=$(echo '${{ inputs.repos }}' | jq -c -r '.[]')

          for repo in $repos; do
            echo "Processing $repo..."

            mkdir -p "$repo"
            git clone "https://github.com/n3oltd/$repo.git" "$repo"

            (
              cd "$repo/src"
              git config user.name "N3O Bot"
              git config user.email "no-reply@n3o.ltd"

              dotnet tool run n3o nuget upgrade-our-packages

              if [ -n "$(git status --porcelain)" ]; then
                git add .
                git commit -m "Upgraded NuGet packages"
                git push origin main
              else
                echo "No package updates found for $repo"
              fi
            )
          done
