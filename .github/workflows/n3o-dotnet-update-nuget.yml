# Reusable workflow that runs the n3o CLI to upgrade our own NuGet packages to their
# latest versions across the org (or a single repo) and commits the changes upstream.
# Use it to roll out internal package updates automatically.
name: 'dotnet-update-nuget'

on:
  workflow_call:
    inputs:
      repo:
        description: Optional single repo name. If omitted, the whole org is processed.
        required: false
        type: string

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: setup dotnet + n3o cli
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}

      - name: configure git identity
        id: git
        uses: n3oltd/actions/.github/actions/n3o-git-identity@main
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}

      - name: upgrade
        env:
          GH_PAT: ${{ steps.git.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "${{ inputs.repo }}" ]; then
            n3o nuget upgrade --our-packages --target=remote --repo="${{ inputs.repo }}" --no-input
          else
            n3o nuget upgrade --our-packages --target=remote --no-input
          fi
