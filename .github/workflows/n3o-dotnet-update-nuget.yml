name: 'dotnet-update-nuget'

on:
  workflow_call:
    inputs:
      repo:
        description: Optional single repo name. If omitted, the whole org is processed.
        required: false
        type: string

jobs:
  upgrade:
    runs-on: ubuntu-latest

    steps:
      - name: setup-dotnet
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '10.x'

      - name: install n3o cli
        uses: n3oltd/actions/.github/actions/n3o-cli-install@main
        with:
          access-token: ${{ secrets.GH_PAT }}

      - name: upgrade
        env:
          GH_PAT: ${{ secrets.GH_PAT }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
        run: |
          if [ -n "${{ inputs.repo }}" ]; then
            dotnet tool run n3o nuget upgrade --our-packages --target=remote --repo="${{ inputs.repo }}" --script
          else
            dotnet tool run n3o nuget upgrade --our-packages --target=remote --script
          fi
