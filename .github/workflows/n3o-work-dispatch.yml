# Reusable workflow that syncs PR and push activity to issues in the n3oltd/work repo.
# Dispatches PR/commit references to the n3o CLI, tracks rollouts, and on merge releases
# each referenced work issue whose Product is internal (ship-on-merge products) to prod.
# Call it from a repo's PR/push workflow to keep work-tracking in sync with code changes.
name: 'n3o-work-dispatch'

on:
  workflow_call:

jobs:
  pr:
    if: >-
      github.event_name == 'pull_request' &&
      github.actor != 'dependabot[bot]' &&
      github.actor != 'n3o-babar[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}
          owner: n3oltd

      - name: setup dotnet + n3o cli
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-client-id: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}

      - name: dispatch PR references
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
          PR_MERGED: ${{ github.event.pull_request.merged }}
          PR_DRAFT: ${{ github.event.pull_request.draft }}
        run: |
          flags=""
          if [ "$PR_MERGED" = "true" ]; then flags="$flags --merged"; fi
          if [ "$PR_DRAFT" = "true" ]; then flags="$flags --draft"; fi

          n3o work pr-dispatch \
            --pr-repo "$GITHUB_REPOSITORY" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --title "$PR_TITLE" \
            --body "$PR_BODY" \
            --state "${{ github.event.pull_request.state }}" \
            --base-ref "${{ github.event.pull_request.base.ref }}" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            $flags

      - name: dispatch rollout tracking
        if: github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          PR_REPO: ${{ github.event.repository.name }}
          PR_NUMBER: ${{ github.event.pull_request.number }}
        run: |
          # Rollout detection needs the PR diff, so the work repo runs it via the n3o CLI;
          # it no-ops if the PR introduced no datafix or migration.
          jq -n --arg repo "$PR_REPO" --argjson num "$PR_NUMBER" \
            '{event_type: "rollout-track", client_payload: {pr_repo: $repo, pr_number: $num}}' \
            | gh api repos/n3oltd/work/dispatches -X POST --input -

      - name: release referenced internal issues
        if: github.event.pull_request.merged == true
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          # Merging IS the prod release for internal products. Advance each
          # n3oltd/work issue referenced by this merged PR to Released to Prod;
          # --internal-only gates on the issue's Product so only internal products
          # are released, others left for their deploy. mark-released is idempotent.
          issues=$(printf '%s\n%s\n' "$PR_TITLE" "$PR_BODY" \
            | grep -oiE 'n3oltd/work#[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -un || true)

          if [ -z "$issues" ]; then
            echo "No n3oltd/work references in this PR; nothing to release."
            exit 0
          fi

          for n in $issues; do
            echo "releasing n3oltd/work#$n to prod if its Product is internal"
            n3o work mark-released --issue "$n" --env prod --internal-only
          done

  guard-linked:
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest

    steps:
      - name: exemptions
        id: gate
        env:
          PR_MERGED: ${{ github.event.pull_request.merged }}
          ACTOR: ${{ github.actor }}
          # Escape hatch for a genuine untracked chore: a `no-work-issue` marker in the PR body.
          OPT_OUT: ${{ contains(github.event.pull_request.body, 'no-work-issue') }}
        run: |
          skip=false
          if [ "$PR_MERGED" = "true" ] || [ "$OPT_OUT" = "true" ]; then skip=true; fi
          if [ "$ACTOR" = "dependabot[bot]" ] || [ "$ACTOR" = "n3o-babar[bot]" ]; then skip=true; fi
          echo "skip=$skip" >> "$GITHUB_OUTPUT"

      - name: app token
        if: steps.gate.outputs.skip != 'true'
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}
          owner: n3oltd

      - name: setup dotnet + n3o cli
        if: steps.gate.outputs.skip != 'true'
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-client-id: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}

      - name: require a work-issue reference
        if: steps.gate.outputs.skip != 'true'
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          PR_TITLE: ${{ github.event.pull_request.title }}
          PR_BODY: ${{ github.event.pull_request.body }}
        run: |
          n3o work guard-linked \
            --pr-repo "$GITHUB_REPOSITORY" \
            --pr-number "${{ github.event.pull_request.number }}" \
            --title "$PR_TITLE" \
            --body "$PR_BODY"

  push:
    if: >-
      github.event_name == 'push' &&
      github.ref == format('refs/heads/{0}', github.event.repository.default_branch) &&
      github.actor != 'n3o-babar[bot]' &&
      github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    steps:
      - name: app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}
          owner: n3oltd

      - name: setup dotnet + n3o cli
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-client-id: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}

      - name: dispatch commit references
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          messages=$(echo "$COMMITS_JSON" | jq -r 'map(.message) | join("\n")')

          n3o work commit-dispatch \
            --repo "$GITHUB_REPOSITORY" \
            --default-branch "${{ github.event.repository.default_branch }}" \
            --messages "$messages"

      - name: release referenced internal issues
        env:
          GH_TOKEN: ${{ steps.app-token.outputs.token }}
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          COMMITS_JSON: ${{ toJSON(github.event.commits) }}
        run: |
          # Direct-push counterpart of the pr-job release step: release n3oltd/work
          # issues referenced in the pushed commit messages (covers direct pushes to
          # the default branch and squash-merges that carry the ref in the commit).
          # mark-released is idempotent, so overlap with the pr-job step is harmless.
          issues=$(echo "$COMMITS_JSON" \
            | jq -r 'map(.message) | join("\n")' \
            | grep -oiE 'n3oltd/work#[0-9]+' \
            | grep -oE '[0-9]+' \
            | sort -un || true)

          if [ -z "$issues" ]; then
            echo "No n3oltd/work references in this push; nothing to release."
            exit 0
          fi

          for n in $issues; do
            echo "releasing n3oltd/work#$n to prod if its Product is internal"
            n3o work mark-released --issue "$n" --env prod --internal-only
          done
