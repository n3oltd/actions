# Reusable workflow backing the /babar bot. A repo enables it with a thin caller on
# issue_comment (see n3oltd/work/.github/workflows/babar.yml). This gates on org
# membership and a per-user daily quota, resolves and renders the requested prompt
# (`n3o babar prompt <command>`), runs it through Claude, and lets the prompt post its
# own result back on the thread. The set of /babar commands is the set of agents
# prompts that declare a `babar:` alias — adding a command is a prompt change, not a
# workflow change.
name: n3o babar

on:
  workflow_call:

permissions:
  contents: read
  issues: write
  pull-requests: write

jobs:
  babar:
    # author_association gates the job before it starts, so an outsider commenting on a
    # public repo can't even spin up the runner (the org-membership step below is the
    # authoritative check). OWNER/MEMBER/COLLABORATOR covers org members and repo collaborators.
    if: >-
      ${{ startsWith(github.event.comment.body, '/babar ')
          && contains(fromJSON('["OWNER","MEMBER","COLLABORATOR"]'), github.event.comment.author_association) }}
    # Private repos run on the self-hosted fleet (queue if busy — babar can wait, no paid
    # minutes); public-repo callers fall back to hosted since the fleet's runner group is
    # private-repo only.
    runs-on: ${{ github.event.repository.private && 'n3o-github-runner' || 'ubuntu-latest' }}
    timeout-minutes: 45
    env:
      AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
      AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
      AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
      # Cloned service/library repos restore the private NuGet feed via %GH_USERNAME%/%GH_PAT%,
      # so the agent can build-verify a fix. Distinct from the bot token used for gh/git.
      GH_USERNAME: n3oltd
      GH_PAT: ${{ secrets.GH_PAT }}
      MCP_CONFIG: '{"mcpServers":{"n3o":{"type":"stdio","command":"n3o","args":["mcp"]}}}'
      COMMENTER: ${{ github.event.comment.user.login }}
      THREAD: ${{ github.event.issue.number }}
      BODY: ${{ github.event.comment.body }}
      # GitHub logins exempt from the per-user daily cap. JSON array, matched against COMMENTER.
      EXCLUDED_FROM_LIMITS: '["nadrummond"]'
    steps:
      - uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-client-id: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          azure-client-secret: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}

      # Mints the n3o-babar App token and points git at it, so the agent can push
      # branches and open PRs across repos. Also used for the gh comments below.
      - name: configure git identity
        id: identity
        uses: n3oltd/actions/.github/actions/n3o-git-identity@main
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}

      - name: Use the bot token for gh
        env:
          N3O_TOKEN: ${{ steps.identity.outputs.token }}
        run: echo "GH_TOKEN=$N3O_TOKEN" >> "$GITHUB_ENV"

      # Hard requirement: only members of the n3oltd organisation can drive the bot.
      - name: Gate on org membership
        run: |
          if ! gh api "orgs/n3oltd/members/$COMMENTER" >/dev/null 2>&1; then
            gh issue comment "$THREAD" --repo "$GITHUB_REPOSITORY" \
              --body "@$COMMENTER \`/babar\` is only available to members of the n3oltd organisation."
            exit 1
          fi

      - name: Parse the command
        id: parse
        run: |
          # Body is "/babar <command> [free text]". The free text may span multiple lines
          # so take the first whitespace-delimited token after the marker as the command and
          # treat everything after it — newlines included — as the context handed to the prompt.
          rest="${BODY#/babar }"
          command="${rest%%[[:space:]]*}"
          context="${rest#"$command"}"
          # Drop the single run of whitespace/newlines separating the command from its text.
          context="${context#"${context%%[![:space:]]*}"}"
          echo "command=$command" >> "$GITHUB_OUTPUT"
          {
            echo "context<<__BABAR_EOF__"
            printf '%s\n' "$context"
            echo "__BABAR_EOF__"
          } >> "$GITHUB_OUTPUT"

      # Per-user daily cap (default 20, resets 00:00 UTC). Claimed before any work so a
      # rate-limited user cannot consume a Claude run. Writes to the babar-quota branch.
      # Logins in EXCLUDED_FROM_LIMITS are skipped entirely, so the cap never applies to them.
      - name: Claim the daily quota
        run: |
          if jq -e --arg u "$COMMENTER" 'index($u) != null' <<< "$EXCLUDED_FROM_LIMITS" >/dev/null; then
            echo "$COMMENTER is excluded from babar limits; skipping the daily quota."
            exit 0
          fi
          if ! n3o babar claim --user "$COMMENTER"; then
            gh issue comment "$THREAD" --repo "$GITHUB_REPOSITORY" \
              --body "@$COMMENTER you have reached today's \`/babar\` limit. It resets at 00:00 UTC."
            exit 1
          fi

      # Acknowledge with a 👀 reaction on the triggering comment rather than a reply, so
      # the only comment babar adds to the thread is the prompt's single result comment.
      - name: Acknowledge
        env:
          COMMENT_ID: ${{ github.event.comment.id }}
        run: |
          gh api --method POST \
            "repos/$GITHUB_REPOSITORY/issues/comments/$COMMENT_ID/reactions" \
            -f content=eyes

      # Resolve the command to its prompt (by babar alias) and render it with the thread
      # context. Unknown command → the catalogue has no matching alias, so explain and stop.
      - name: Render the prompt
        env:
          COMMAND: ${{ steps.parse.outputs.command }}
          CONTEXT: ${{ steps.parse.outputs.context }}
        run: |
          # The thread number is passed under both `issue` and `pr`: issue_comment carries it
          # as issue.number for issues and PRs alike, so issue-keyed prompts (diagnose,
          # summarize) and pr-keyed prompts (review) both resolve. Unused keys are ignored.
          if ! n3o babar prompt "$COMMAND" \
                --set issue="$THREAD" \
                --set pr="$THREAD" \
                --set repo="${GITHUB_REPOSITORY#*/}" \
                --set context="$CONTEXT" \
                --set commenter="$COMMENTER" > "$RUNNER_TEMP/prompt.md"; then
            gh issue comment "$THREAD" --repo "$GITHUB_REPOSITORY" \
              --body "@$COMMENTER I don't recognise \`/babar $COMMAND\`."
            exit 1
          fi

      # continue-on-error keeps the job alive after a failed/cut-short run so the report-back step
      # still fires — the thread must never go silent. WebFetch/WebSearch let the agent follow
      # Sentry/doc links rather than stall on a rejected permission. max-turns/max-cost are runaway
      # guards, not budgets — sized for a diagnose that clones and build-verifies.
      - name: Run Claude
        id: claude
        continue-on-error: true
        uses: n3oltd/actions/.github/actions/n3o-claude-run@main
        with:
          prompt-file: ${{ runner.temp }}/prompt.md
          oauth-token: ${{ secrets.CLAUDE_CODE_OAUTH_TOKEN }}
          allowed-tools: Read Grep Glob Edit Write Bash WebFetch WebSearch mcp__n3o__*
          mcp-config: ${{ env.MCP_CONFIG }}
          max-turns: '150'
          max-cost-usd: '6'
          github-token: ${{ secrets.GH_PAT }}

      # The prompt posts its own result on success; a cut-short (error_max_turns/max_cost) or
      # crashed run posts nothing, so report back here. Fire only when Claude errored or produced
      # no result at all (empty subtype) — a clean run, and the post-run cost tripwire where the
      # agent already commented, are both left alone, so we never double-post.
      - name: Report back when the run could not finish
        if: ${{ steps.claude.outputs.is-error == 'true' || steps.claude.outputs.subtype == '' }}
        env:
          COMMAND: ${{ steps.parse.outputs.command }}
          SUBTYPE: ${{ steps.claude.outputs.subtype }}
          NUM_TURNS: ${{ steps.claude.outputs.num-turns }}
          COST_USD: ${{ steps.claude.outputs.cost-usd }}
          LAST_TEXT: ${{ steps.claude.outputs.last-text }}
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        run: |
          case "$SUBTYPE" in
            error_max_turns) reason="ran out of its turn budget (${NUM_TURNS:-?} turns)";;
            error_max_cost)  reason="hit its cost ceiling (\$${COST_USD:-?})";;
            "")              reason="failed before producing a result";;
            *)               reason="ended early ($SUBTYPE)";;
          esac
          {
            echo "@$COMMENTER \`/babar $COMMAND\` couldn't complete — it $reason, so it didn't finish its reply."
            echo
            if [ -n "$LAST_TEXT" ]; then
              echo "Here's how far it got before stopping:"
              echo
              echo "> ${LAST_TEXT//$'\n'/$'\n'> }"
              echo
            fi
            echo "Re-run with a hint to narrow the task — add a focus or the likely area after the command, e.g. \`/babar $COMMAND <focus or area>\` — so it can finish within budget. [Run log]($RUN_URL)."
          } > "$RUNNER_TEMP/babar-failure.md"
          gh issue comment "$THREAD" --repo "$GITHUB_REPOSITORY" --body-file "$RUNNER_TEMP/babar-failure.md"

      # Re-surface the failure continue-on-error masked, so `gh run list` and required checks
      # still reflect that the run did not succeed.
      - name: Fail the job if the run did not succeed
        if: ${{ steps.claude.outcome == 'failure' }}
        run: |
          echo "::error::Claude run did not succeed (subtype=${{ steps.claude.outputs.subtype }}, is_error=${{ steps.claude.outputs.is-error }})"
          exit 1
