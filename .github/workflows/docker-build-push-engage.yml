name: 'docker-build-push-engage'

on:
  push:
    branches:
      - zeeshanshaheenn3o-patch-1

  workflow_call:
    inputs:
      docker-file:
        type: string
        required: true

      project:
        type: string
        required: true


jobs:
  build-push-docker-image-job:    

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - id: buildx
        uses: docker/setup-buildx-action@v3

      - name: acr login
        uses: docker/login-action@v3
        with:
          registry: n3oltd.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: fetch dockerfile
        uses: wei/wget@v1
        with:
          args: -O ${{ inputs.docker-file }} https://raw.githubusercontent.com/n3oltd/actions/zeeshanshaheenn3o-patch-1/docker/n3o-engage
          
      - id: meta-fe-engage
        name: prepare fe-engage
        run: |
          DOCKER_IMAGE_NAME=$(echo ${{ inputs.project }} | tr '[:upper:]' '[:lower:]' | tr "." "-")
          DOCKER_IMAGE=n3oltd.azurecr.io/$DOCKER_IMAGE_NAME
          NOW=$(date +'%Y.%-m.%-d')
          VERSION="$NOW.${{ github.run_number }}"       
          VERSIONTAG="${DOCKER_IMAGE}:${VERSION}"
          LATESTTAG="${DOCKER_IMAGE}:latest"
          echo "versiontag=$VERSIONTAG" >> $GITHUB_OUTPUT
          echo "latesttag=$LATESTTAG" >> $GITHUB_OUTPUT

      - name: build and push engage
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: .
          target: final
          file: ${{ inputs.docker-file }}
          push: true
          tags: ${{ steps.meta-fe-engage.outputs.versiontag }} , ${{ steps.meta-fe-engage.outputs.latesttag }}
          build-args: |
            REACT_APP_SENTRY_RELEASE=${{ github.sha }}
            REACT_APP_LOG_TO_SENTRY=true
          secrets: |
            github_token=${{ secrets.GH_PACKAGES_TOKEN }}
            sentry_auth_token=${{ secrets.SENTRY_AUTH_TOKEN }}
