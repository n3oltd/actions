’╗┐# Builds and pushes an N3O service Docker image to ACR with date/latest/sha
# tags, skipping the build if an image for the commit already exists, and
# optionally extracts sourcemaps and creates a Sentry release.
name: 'docker-build-push'

on:
  workflow_call:
    inputs:
      branch:
        description: git branch to build from
        type: string
        required: false
        default: 'main'

      build-args:
        description: docker build arguments
        type: string
        required: false
        default: ''

      container-repository:
        description: container registry repository to push the image to
        type: string
        required: true

      dockerfile:
        description: path to the Dockerfile
        type: string
        required: true

      context:
        description: docker build context path
        type: string
        required: false
        default: './src'

      secrets:
        description: docker build secrets passed to the build
        type: string
        required: false
        default: ''

      sentry-project:
        description: Sentry project slug for the release and sourcemaps (empty to skip Sentry)
        type: string
        required: false
        default: ''

      sentry-extract-sourcemaps:
        description: whether to extract and upload sourcemaps to Sentry
        type: boolean
        required: false
        default: false

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  job1:
    name: ubuntu-latest

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          ref: ${{ inputs.branch }}

      - id: buildx
        uses: docker/setup-buildx-action@v4

      - name: acr login
        uses: docker/login-action@v4
        with:
          registry: n3oltd.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - id: check-existing
        name: check if image already exists for this commit
        shell: bash
        run: |
          SHA_TAG="n3oltd.azurecr.io/${{ inputs.container-repository }}:sha-${GITHUB_SHA}"
          if docker manifest inspect "$SHA_TAG" >/dev/null 2>&1; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
            echo "$SHA_TAG already exists ŌĆö skipping build"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: fetch dockerfile
        if: steps.check-existing.outputs.exists != 'true'
        uses: wei/wget@v1
        with:
          args: -O ${{ inputs.dockerfile }} https://raw.githubusercontent.com/n3oltd/actions/main/docker/${{ inputs.dockerfile }}

      - id: metadata
        name: metadata
        if: steps.check-existing.outputs.exists != 'true'
        run: |
          ACR_REPOSITORY=n3oltd.azurecr.io/${{ inputs.container-repository }}
          NOW=$(date +'%Y.%-m.%-d')
          VERSION="$NOW.${{ github.run_number }}"
          VERSIONTAG="${ACR_REPOSITORY}:${VERSION}"
          LATESTTAG="${ACR_REPOSITORY}:latest"
          CREATED=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          echo "version-tag=$VERSIONTAG" >> $GITHUB_OUTPUT
          echo "latest-tag=$LATESTTAG" >> $GITHUB_OUTPUT
          echo "created=$CREATED" >> $GITHUB_OUTPUT

      - id: build-args
        name: prepare build args
        if: steps.check-existing.outputs.exists != 'true'
        run: |
          {
            echo "args<<EOF"
            echo "FEED_URL=https://nuget.pkg.github.com/n3oltd/index.json"
            echo "PAT=${{ env.GH_PAT }}"
            if [[ -n "${{ inputs.sentry-project }}" ]]; then
              echo "REACT_APP_SENTRY_RELEASE=${{ steps.metadata.outputs.version }}"
              echo "VITE_SENTRY_RELEASE=${{ steps.metadata.outputs.version }}"
            fi
            if [[ -n "${{ secrets.PRINCE_LICENSE_ID }}" ]]; then
              echo "PRINCE_LICENSE_ID=${{ secrets.PRINCE_LICENSE_ID }}"
              echo "PRINCE_LICENSE_NAME=${{ secrets.PRINCE_LICENSE_NAME }}"
              echo "PRINCE_LICENSE_VENDOR=${{ secrets.PRINCE_LICENSE_VENDOR }}"
              echo "PRINCE_PRODUCT=${{ secrets.PRINCE_PRODUCT }}"
              echo "PRINCE_VERSION=${{ secrets.PRINCE_VERSION }}"
              echo "PRINCE_END_USER=${{ secrets.PRINCE_END_USER }}"
              echo "PRINCE_DATE=${{ secrets.PRINCE_DATE }}"
              echo "PRINCE_SIGNATURE=${{ secrets.PRINCE_SIGNATURE }}"
              echo "PRINCE_OPTION_ID=${{ secrets.PRINCE_OPTION_ID }}"
              echo "CHPASSWORD=${{ secrets.CHPASSWORD }}"
            fi
            if [[ -n "${{ inputs.build-args }}" ]]; then
              echo "${{ inputs.build-args }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: build and push
        if: steps.check-existing.outputs.exists != 'true'
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ inputs.context }}
          target: final
          file: ${{ inputs.dockerfile }}
          build-args: ${{ steps.build-args.outputs.args }}
          secrets: |
            github_token=${{ env.GH_PAT }}
            sentry_auth_token=${{ env.SENTRY_AUTH_TOKEN }}
            ${{ inputs.secrets }}
          push: true
          tags: |
            ${{ steps.metadata.outputs.version-tag }}
            ${{ steps.metadata.outputs.latest-tag }}
            n3oltd.azurecr.io/${{ inputs.container-repository }}:sha-${{ github.sha }}
          labels: |
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.created=${{ steps.metadata.outputs.created }}
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}

      - name: extract sourcemaps
        if: steps.check-existing.outputs.exists != 'true' && inputs.sentry-project != '' && inputs.sentry-extract-sourcemaps
        uses: docker/build-push-action@v7
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ inputs.context }}
          file: ${{ inputs.dockerfile }}
          target: sourcemaps
          outputs: type=local,dest=${{ runner.temp }}/sourcemaps
          build-args: ${{ steps.build-args.outputs.args }}
          secrets: |
            github_token=${{ env.GH_PAT }}
            sentry_auth_token=${{ env.SENTRY_AUTH_TOKEN }}
            ${{ inputs.secrets }}

      - name: sentry release
        if: steps.check-existing.outputs.exists != 'true' && inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ steps.metadata.outputs.version }}
          sourcemaps: ${{ inputs.sentry-extract-sourcemaps && format('{0}/sourcemaps', runner.temp) || '' }}
          auth-token: ${{ env.SENTRY_AUTH_TOKEN }}
