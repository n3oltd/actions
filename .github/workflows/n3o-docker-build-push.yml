name: 'docker-build-push'

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: false
        default: 'main'

      build-configuration:
        type: string
        required: false
        default: Release

      container-repository:
        type: string
        required: true
    
      dockerfile:
        type: string
        required: true

      project-to-build:
        type: string
        required: true

env:
  GH_PAT: ${{ secrets.GH_PACKAGES_TOKEN }}

jobs:
  job1:
    name: ubuntu-latest

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - id: buildx
        uses: docker/setup-buildx-action@v3

      - name: acr login
        uses: docker/login-action@v3
        with:
          registry: n3oltd.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: fetch dockerfile
        uses: wei/wget@v1
        with:
          args: -O ${{ inputs.dockerfile }} https://raw.githubusercontent.com/n3oltd/actions/main/docker/${{ inputs.dockerfile }}

      - id: metadata
        name: metadata
        run: |
          ACR_REPOSITORY=n3oltd.azurecr.io/${{ inputs.container-repository }}
          NOW=$(date +'%Y.%-m.%-d')
          VERSION="$NOW.${{ github.run_number }}"
          VERSIONTAG="${ACR_REPOSITORY}:${VERSION}"
          LATESTTAG="${ACR_REPOSITORY}:latest"
          echo "version-tag=$VERSIONTAG" >> $GITHUB_OUTPUT
          echo "latest-tag=$LATESTTAG" >> $GITHUB_OUTPUT

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ./src
          target: final
          file: ${{ inputs.dockerfile }}
          build-args: |
            "PROJECT=${{inputs.project-to-build}}"
            "FEED_URL=https://nuget.pkg.github.com/n3oltd/index.json"
            "PAT=${{ env.GH_PAT }}"
            "CONFIGURATION=${{ inputs.build-configuration }}"
          push: true
          tags: ${{ steps.metadata.outputs.version-tag }} , ${{ steps.metadata.outputs.latest-tag }}
