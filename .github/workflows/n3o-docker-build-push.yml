name: 'docker-build-push'

on:
  workflow_call:
    inputs:
      branch:
        type: string
        required: false
        default: 'main'

      build-args:
        type: string
        required: false
        default: ''

      container-repository:
        type: string
        required: true

      dockerfile:
        type: string
        required: true

      context:
        type: string
        required: false
        default: './src'

      secrets:
        type: string
        required: false
        default: ''

env:
  GH_PAT: ${{ secrets.GH_PACKAGES_TOKEN }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  job1:
    name: ubuntu-latest

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - id: buildx
        uses: docker/setup-buildx-action@v3

      - name: acr login
        uses: docker/login-action@v3
        with:
          registry: n3oltd.azurecr.io
          username: ${{ secrets.ACR_USERNAME }}
          password: ${{ secrets.ACR_PASSWORD }}

      - name: fetch dockerfile
        uses: wei/wget@v1
        with:
          args: -O ${{ inputs.dockerfile }} https://raw.githubusercontent.com/n3oltd/actions/main/docker/${{ inputs.dockerfile }}

      - id: metadata
        name: metadata
        run: |
          ACR_REPOSITORY=n3oltd.azurecr.io/${{ inputs.container-repository }}
          NOW=$(date +'%Y.%-m.%-d')
          VERSION="$NOW.${{ github.run_number }}"
          VERSIONTAG="${ACR_REPOSITORY}:${VERSION}"
          LATESTTAG="${ACR_REPOSITORY}:latest"
          echo "version-tag=$VERSIONTAG" >> $GITHUB_OUTPUT
          echo "latest-tag=$LATESTTAG" >> $GITHUB_OUTPUT

      - id: build-args
        name: prepare build args
        run: |
          {
            echo "args<<EOF"
            echo "FEED_URL=https://nuget.pkg.github.com/n3oltd/index.json"
            echo "PAT=${{ env.GH_PAT }}"
            if [[ -n "${{ secrets.PRINCE_LICENSE_ID }}" ]]; then
              echo "PRINCE_LICENSE_ID=${{ secrets.PRINCE_LICENSE_ID }}"
              echo "PRINCE_LICENSE_NAME=${{ secrets.PRINCE_LICENSE_NAME }}"
              echo "PRINCE_LICENSE_VENDOR=${{ secrets.PRINCE_LICENSE_VENDOR }}"
              echo "PRINCE_PRODUCT=${{ secrets.PRINCE_PRODUCT }}"
              echo "PRINCE_VERSION=${{ secrets.PRINCE_VERSION }}"
              echo "PRINCE_END_USER=${{ secrets.PRINCE_END_USER }}"
              echo "PRINCE_DATE=${{ secrets.PRINCE_DATE }}"
              echo "PRINCE_SIGNATURE=${{ secrets.PRINCE_SIGNATURE }}"
              echo "PRINCE_OPTION_ID=${{ secrets.PRINCE_OPTION_ID }}"
              echo "CHPASSWORD=${{ secrets.CHPASSWORD }}"
            fi
            if [[ -n "${{ inputs.build-args }}" ]]; then
              echo "${{ inputs.build-args }}"
            fi
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: build and push
        uses: docker/build-push-action@v6
        with:
          builder: ${{ steps.buildx.outputs.name }}
          context: ${{ inputs.context }}
          target: final
          file: ${{ inputs.dockerfile }}
          build-args: ${{ steps.build-args.outputs.args }}
          secrets: |
            github_token=${{ env.GH_PAT }}
            sentry_auth_token=${{ env.SENTRY_AUTH_TOKEN }}
            ${{ inputs.secrets }}
          push: true
          tags: ${{ steps.metadata.outputs.version-tag }} , ${{ steps.metadata.outputs.latest-tag }}
