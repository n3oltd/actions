# Deploys a single N3O site to an AKS cluster by applying the latest versioned manifests for that site.
# Resolves the deployment version from metadata.json under the region's sites/<site-id> folder and optionally creates a Sentry release.
# Called to roll out or update an individual site in a region.
name: Deploy N3O Site

on:
  workflow_call:
    inputs:
      data-region:
        description: data residency region the deployment targets (e.g. eu1)
        type: string
        required: true

      site-id:
        description: identifier of the site to deploy
        type: string
        required: true

      sentry-project:
        description: Sentry project slug for the release and sourcemaps (empty to skip Sentry)
        type: string
        required: false
        default: ''

      sentry-environment:
        description: Sentry environment name for the release (empty to skip)
        type: string
        required: false
        default: ''

jobs:
  deploy-to-aks:
    name: Deploy to AKS

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ inputs.data-region }}/sites/${{ inputs.site-id }}
            
      - id: get-deployment-version
        name: Get Deployment Version
        working-directory: ${{ inputs.data-region }}/sites/${{ inputs.site-id }}/latest
        run: |
          deploymentVersion=$(jq -r '.deploymentVersion' metadata.json)
          echo "deploymentVersion=$deploymentVersion" >> $GITHUB_OUTPUT
          
      - name: kubectl Setup
        uses: n3oltd/actions/.github/actions/n3o-kubectl-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ inputs.data-region }}
          
      - name: Apply YAML
        uses: n3oltd/actions/.github/actions/n3o-kubectl-apply-files@main
        with:
          working-directory: ${{ inputs.data-region }}/sites/${{ inputs.site-id }}/${{ steps.get-deployment-version.outputs.deploymentVersion }}
          replace-yaml: false

      - name: sentry deploy
        if: inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ steps.get-deployment-version.outputs.deploymentVersion }}
          environment: ${{ inputs.sentry-environment }}
          auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
