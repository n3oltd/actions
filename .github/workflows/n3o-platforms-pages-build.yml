# Installs dependencies and builds the platforms-pages app via Turbo. Call this
# to produce a build of the Platforms marketing/content pages bundle.
name: Build Platforms Pages

on:
  workflow_call:

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  build:
    name: Build and Push

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: setup-node
        uses: n3oltd/actions/.github/actions/n3o-node-setup@main
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          token: ${{ env.GH_PAT }}

      - name: npm install and build
        run: |
          npm ci
          npx turbo build --filter=@n3oltd/platforms-pages
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_PAT }}
