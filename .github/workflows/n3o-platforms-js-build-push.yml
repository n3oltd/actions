# Builds the n3o-elements library for a subscription and publishes it as a
# versioned npm package to GitHub Packages, optionally creating a Sentry release
# with sourcemaps. Call this to publish the Platforms JS package for a tenant.
name: 'Build & Push Platforms JS'

on:
  workflow_call:
    inputs:
      subscription-code:
        description: platforms subscription code identifying the charity/tenant
        type: string
        required: true

      sentry-project:
        description: Sentry project slug for the release and sourcemaps (empty to skip Sentry)
        type: string
        required: false
        default: ''

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  build-push:
    name: Build and Push

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v7

      - name: setup-node
        uses: n3oltd/actions/.github/actions/n3o-node-setup@main
        with:
          node-version: '22.x'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'
          token: ${{ env.GH_PAT }}
          
      - name: Fetch config files
        run: |
          mkdir -p packages/n3o-elements/src

          wget -O app.json https://cdn.n3o.cloud/connect-${{ inputs.subscription-code }}/build/app.json
          wget -O themes.json https://cdn.n3o.cloud/connect-${{ inputs.subscription-code }}/build/themes.json
          wget -O localization.json https://cdn.n3o.cloud/connect-${{ inputs.subscription-code }}/subscription/localization.json

          jq -n \
            --arg app "$(cat app.json)" \
            --arg themes "$(cat themes.json)" \
            '{app: ($app | fromjson), themes: ($themes | fromjson)}' \
            > packages/n3o-elements/src/configuration.json

          jq -n \
            --arg localization "$(cat localization.json)" \
            '{localization: ($localization | fromjson)}' \
            > packages/formatter/src/configuration.json

      - id: version
        name: compute version
        run: |
          version="$(date +"%Y.%m.%d")-${{ github.run_number }}"
          echo "version=$version" >> $GITHUB_OUTPUT
          release="platforms-js@$version-${{ inputs.subscription-code }}"
          echo "release=$release" >> $GITHUB_OUTPUT

      - name: npm install and build
        run: |
          npm ci --legacy-peer-deps
          npm run build:n3o-elements
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_PAT }}
          VITE_SUBSCRIPTION_CODE: ${{ inputs.subscription-code }}
          VITE_SENTRY_RELEASE: ${{ steps.version.outputs.release }}
          npm_config_fetch_retry_mintimeout: 30000
          npm_config_fetch_retries: 5

      - name: npm publish
        working-directory: packages/n3o-elements
        run: |
          name="@n3oltd/platforms-js-${{ inputs.subscription-code }}"
          jq "del(.devDependencies, .scripts, .dependencies) | .name = \"$name\"" package.json > tmp.json && mv tmp.json package.json
          npm version ${{ steps.version.outputs.version }};
          echo "//npm.pkg.github.com/:_authToken=${{ env.GH_PAT }}" >> .npmrc;
          echo "@n3oltd:registry=https://npm.pkg.github.com" >> .npmrc;
          npm publish;
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_PAT }}

      - name: sentry release
        if: inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ steps.version.outputs.release }}
          sourcemaps: packages/n3o-elements/dist
          auth-token: ${{ env.SENTRY_AUTH_TOKEN }}
