name: 'dotnet-build-pack-push'

on:
  workflow_call:
    inputs:
      runs-on:
        type: string
        default: ubuntu-latest

      dotnet-version:
        type: string
        default: 10.x

      working-directory:
        type: string
        default: src

      build-configuration:
        type: string
        default: Release

      run-tests:
        type: boolean
        default: false

      run-pack:
        type: boolean
        default: false

      version-strategy:
        type: string
        default: tag
        # 'tag': version from git tag (refs/tags/v*), fallback 1.0.0
        # 'date': date-based version (YYYY.M.D.run_number)

      nuget-source:
        type: string
        default: 'https://api.nuget.org/v3/index.json'

      version-suffix:
        type: string
        default: ''

    secrets:
      nuget-api-key:
        required: false

jobs:
  job1:
    name: ${{ inputs.runs-on }}

    runs-on: ${{ inputs.runs-on }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - id: prepare
        name: Set version
        run: |
          if [ "${{ inputs.version-strategy }}" = "date" ]; then
            NOW=$(date +'%Y.%-m.%-d')
            VERSION="$NOW.${{ github.run_number }}"
          else
            VERSION=1.0.0
            if [[ $GITHUB_REF == refs/tags/* ]]; then
              VERSION=${GITHUB_REF#refs/tags/v}
            fi
          fi
          if [ -n "${{ inputs.version-suffix }}" ]; then
            VERSION="$VERSION-${{ inputs.version-suffix }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      - name: dotnet restore
        run: dotnet restore

      - name: dotnet build
        run: dotnet build --configuration ${{ inputs.build-configuration }} --no-restore /property:Version=${{ steps.prepare.outputs.VERSION }}

      - name: dotnet test
        if: ${{ inputs.run-tests }}
        run: dotnet test --no-build --verbosity normal

      - name: dotnet pack
        if: ${{ inputs.run-pack }}
        run: dotnet pack --configuration ${{ inputs.build-configuration }} --no-restore --no-build /property:Version=${{ steps.prepare.outputs.VERSION }}

      - name: dotnet nuget push
        if: ${{ inputs.run-pack }}
        run: dotnet nuget push "**/*.nupkg" --source "${{ inputs.nuget-source }}" --api-key "${{ secrets.nuget-api-key }}" --skip-duplicate
