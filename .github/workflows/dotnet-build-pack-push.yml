# Builds, optionally tests and packs a .NET project, pushes any NuGet
# packages to the configured feed, and optionally creates a Sentry release.
name: 'dotnet-build-pack-push'

on:
  workflow_call:
    inputs:
      runs-on:
        description: runner label the job executes on
        type: string
        default: ubuntu-latest

      dotnet-version:
        description: .NET SDK version to set up
        type: string
        default: 10.x

      setup-node:
        description: >-
          whether to set up Node.js (and cache ~/.npm + .turbo) before the build.
          Enable for repos whose MSBuild build runs npm/Turbo (e.g. backoffice
          frontend plugins). The version is read from a .nvmrc at the repo root.
        type: boolean
        default: false

      working-directory:
        description: directory (relative to the repo root) to run the build/commands in
        type: string
        default: src

      build-configuration:
        description: build configuration (e.g. Release)
        type: string
        default: Release

      run-tests:
        description: whether to run tests
        type: boolean
        default: false

      run-pack:
        description: whether to create NuGet packages
        type: boolean
        default: false

      version-strategy:
        description: how the version is derived ('tag' from git tag, 'date' for date-based)
        type: string
        default: tag
        # 'tag': version from git tag (refs/tags/v*), fallback 1.0.0
        # 'date': date-based version (YYYY.M.D.run_number)

      version:
        description: explicit version to use; overrides version-strategy when set
        type: string
        default: ''
        # If set, takes precedence over version-strategy. Use when the caller
        # has already computed the version (e.g. scheduled releases triggered
        # from a branch rather than a tag).

      nuget-source:
        description: NuGet feed to push packages to
        type: string
        default: 'https://api.nuget.org/v3/index.json'

      version-suffix:
        description: optional prerelease suffix appended to the version
        type: string
        default: ''

      sentry-project:
        description: Sentry project slug for the release and sourcemaps (empty to skip Sentry)
        type: string
        required: false
        default: ''

    secrets:
      nuget-api-key:
        required: false

      sentry-auth-token:
        required: false

jobs:
  job1:
    name: ${{ inputs.runs-on }}

    runs-on: ${{ inputs.runs-on }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-dotnet@v5
        with:
          dotnet-version: ${{ inputs.dotnet-version }}

      - uses: actions/setup-node@v4
        if: ${{ inputs.setup-node }}
        with:
          node-version-file: .nvmrc
          cache: npm
          cache-dependency-path: ${{ inputs.working-directory }}/package-lock.json

      - name: cache turbo
        if: ${{ inputs.setup-node && runner.environment == 'github-hosted' }}
        uses: actions/cache@v4
        with:
          path: ${{ inputs.working-directory }}/.turbo
          key: turbo-${{ runner.os }}-${{ github.sha }}
          restore-keys: |
            turbo-${{ runner.os }}-

      - id: prepare
        name: Set version
        run: |
          if [ -n "${{ inputs.version }}" ]; then
            VERSION="${{ inputs.version }}"
          elif [ "${{ inputs.version-strategy }}" = "date" ]; then
            NOW=$(date -u +'%Y.%-m.%-d')
            VERSION="$NOW.${{ github.run_number }}"
          else
            VERSION=1.0.0
            if [[ $GITHUB_REF == refs/tags/* ]]; then
              VERSION=${GITHUB_REF#refs/tags/v}
            fi
          fi
          if [ -n "${{ inputs.version-suffix }}" ]; then
            VERSION="$VERSION-${{ inputs.version-suffix }}"
          fi
          echo "VERSION=$VERSION" >> $GITHUB_OUTPUT

      # Only on GitHub-hosted runners — the self-hosted fleet uses a persistent
      # shared package cache instead of actions/cache's tarball transfer.
      - name: cache nuget packages
        if: runner.environment == 'github-hosted'
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/packages.lock.json', '**/*.csproj', '**/Directory.Packages.props', '**/Directory.Build.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: dotnet restore
        run: dotnet restore

      - name: dotnet build
        run: dotnet build --configuration ${{ inputs.build-configuration }} --no-restore /property:Version=${{ steps.prepare.outputs.VERSION }} /property:SourceRevisionId=${{ github.sha }}

      - name: dotnet test
        if: ${{ inputs.run-tests }}
        run: dotnet test --no-build --verbosity normal

      - name: dotnet pack
        if: ${{ inputs.run-pack }}
        # --no-build must NOT be used here: dotnet pack must rebuild the DLL so that
        # /property:Version is baked into the binary. Using --no-build only updates the
        # .nuspec metadata and leaves the DLL at its default version (1.0.0.0).
        # SourceRevisionId is what the .NET SDK appends to InformationalVersion as
        # "+<sha>" — works regardless of whether SourceLink is explicitly referenced.
        run: dotnet pack --configuration ${{ inputs.build-configuration }} --no-restore /property:Version=${{ steps.prepare.outputs.VERSION }} /property:SourceRevisionId=${{ github.sha }}

      - name: dotnet nuget push
        if: ${{ inputs.run-pack }}
        run: dotnet nuget push "**/*.nupkg" --source "${{ inputs.nuget-source }}" --api-key "${{ secrets.nuget-api-key }}" --skip-duplicate --timeout 900

      - name: sentry release
        if: inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ github.event.repository.name }}@${{ steps.prepare.outputs.VERSION }}
          auth-token: ${{ secrets.sentry-auth-token }}
