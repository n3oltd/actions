# Builds the platforms-playground app and deploys its JS output to the
# platforms-playground Azure blob storage container. Call this to publish an
# updated Playground build.
name: 'Build & Deploy Platforms Playground'

on:
  workflow_call:
    inputs:
      subscription-code:
        description: platforms subscription code identifying the charity/tenant
        type: string
        required: false
        default: ''
      environment:
        description: environment name passed to the playground build as VITE_ENVIRONMENT
        type: string
        required: false
        default: ''

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  job1:
    name: ubuntu-latest

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - name: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          token: ${{ env.GH_PAT }}      

      - name: npm install and build
        run: |
          npm install --legacy-peer-deps
          npx turbo build --filter=@n3oltd/platforms-playground
        env:
          NODE_AUTH_TOKEN: ${{ env.GH_PAT }}
          VITE_SUBSCRIPTION_CODE: ${{ inputs.subscription-code }}
          VITE_ENVIRONMENT: ${{ inputs.environment }}

      - name: Azure Login
        uses: azure/login@v3
        with:
          creds:  ${{ secrets.AZURE_CREDENTIALS }}

      - name: Set Storage Connection String
        run: |
          echo "storage_connection_string=${{ secrets.AZURE_STORAGE_CONNECTION_STRING_PROD }}" >> $GITHUB_ENV          

      - name: Replace js/ in platforms-playground container
        run: |
          az storage blob delete-batch --connection-string "${{ env.storage_connection_string }}" --source "platforms-playground" --pattern "js/*"
          az storage blob upload-batch --connection-string="${{ env.storage_connection_string }}" --destination="platforms-playground" --source="apps/platforms-playground/dist" --destination-path="js" --overwrite="true"
