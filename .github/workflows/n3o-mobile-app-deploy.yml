# Deploys a mobile app over-the-air update by pointing a Capgo channel at the latest bundle.
# Reads the bundle name from metadata and sets the environment's Capgo channel to it.
# Use to promote a mobile-app bundle to a given environment.
name: 'Deploy Mobile App'

on:
  workflow_call:
    inputs:
      app-id:
        description: mobile app identifier (under mobile-apps/)
        type: string
        required: true

      environment-id:
        description: target environment/slot identifier under the deployment path
        type: string
        required: true

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  pick:
    uses: n3oltd/actions/.github/workflows/n3o-pick-runner.yml@main
    secrets: inherit

  deploy-platforms:
    needs: pick
    name: Deploy Mobile App

    runs-on: ${{ needs.pick.outputs.runs-on }}
    
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            mobile-apps/${{ inputs.app-id }}/${{ inputs.environment-id }}
            
      - id: latest-json-metadata
        name: Read latest JSON metadata
        working-directory:  mobile-apps/${{ inputs.app-id }}/${{ inputs.environment-id }}/latest
        run: |
          bundleName=$(jq -r '.bundleName' metadata.json)
          echo "bundleName=$bundleName" >> $GITHUB_OUTPUT
      
      - name: Set Capgo channel
        run:
          npx @capgo/cli@latest channel set ${{ inputs.environment-id }} ${{ inputs.app-id }} --bundle ${{ steps.latest-json-metadata.outputs.bundleName }} --apikey=${{ secrets.CAPGO_API_KEY_UPLOAD }}
          