# Builds the Platforms app JS bundle for a subscription and uploads it to Capgo
# for over-the-air live updates. Call this to ship a web/JS-only update without
# rebuilding the native app.
name: "Build & Push Platforms App"

on:
  workflow_call:
    inputs:
      subscription-code:
        description: platforms subscription code identifying the charity/tenant
        type: string
        required: true

      sentry-project:
        description: Sentry project slug for the release and sourcemaps (empty to skip Sentry)
        type: string
        required: false
        default: ''

env:
  GH_PAT: ${{ secrets.GH_PAT }}
  SENTRY_AUTH_TOKEN: ${{ secrets.SENTRY_AUTH_TOKEN }}

jobs:
  build-web:
    name: Build JS Bundle
    timeout-minutes: 10
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Fetch Configuration # todo: move to generic build setup step
        run: |
          BASE_URL="https://cdn.n3o.cloud/connect-${{ inputs.subscription-code }}"

          curl -fSsL -o apps/platforms-app/build/app.json "$BASE_URL/build/app.json" &
          curl -fSsL -o apps/platforms-app/build/themes.json "$BASE_URL/build/themes.json" &
          curl -fSsL -o packages/formatter/src/localization.json "$BASE_URL/subscription/localization.json" &
          wait

      - name: Compute version
        id: version
        run: |
          version="$(date +"%Y.%m.%d")-${{ github.run_number }}"
          release="platforms-app@$version-${{ inputs.subscription-code }}"
          echo "release=$release" >> $GITHUB_OUTPUT

      - name: Setup Node
        uses: actions/setup-node@v6
        with:
          node-version: 22
          cache: "npm"
          cache-dependency-path: package-lock.json

      - name: Install Dependencies
        run: npm ci --legacy-peer-deps

      - name: Build Web App
        run: npm run build:platforms-app
        env:
          VITE_SUBSCRIPTION_CODE: ${{ inputs.subscription-code }}
          VITE_SENTRY_RELEASE: ${{ steps.version.outputs.release }}

      # note: upto this point, its similar to the build-web job from *build-native.yml
      - name: Use Capgo to upload bundle
        uses: n3oltd/actions/.github/actions/n3o-push-js-bundle-capgo@main
        with:
          bundle-name: cloud.n3o.platforms${{ inputs.subscription-code }}
          capgo-upload-api-key: ${{ secrets.CAPGO_API_KEY_UPLOAD }}
          upload-files-path: "./apps/platforms-app/dist"
          # todo: sort this out in the current monorepo
          package-json-path: "./apps/platforms-app/package.json"
          node-modules-path: "./node_modules,./apps/platforms-app/node_modules"

      - name: sentry release
        if: inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ steps.version.outputs.release }}
          sourcemaps: ./apps/platforms-app/dist
          auth-token: ${{ env.SENTRY_AUTH_TOKEN }}
