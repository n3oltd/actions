# Deploys the Postgres stack to an AKS cluster for a given data region.
# Decrypts the Postgres secrets and applies the versioned manifests from the region's postgres folder.
# Called to provision or update the shared Postgres database in a region.
name: Deploy Postgres to AKS

on:
  workflow_call:
    inputs:
      data-region:
        description: data residency region the deployment targets (e.g. eu1)
        type: string
        required: true

jobs:
  deploy-to-aks:
    name: Deploy Postgres to AKS

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ inputs.data-region }}/postgres
      
      - id: get-deployment-version
        name: Get Deployment Version
        working-directory: ${{ inputs.data-region }}/postgres/latest
        run: |
          deploymentVersion=$(jq -r '.deploymentVersion' metadata.json)
          echo "deploymentVersion=$deploymentVersion" >> $GITHUB_OUTPUT
          
      - id: get-secret-name
        name: Get Secret Name
        working-directory: ${{ inputs.data-region }}/postgres/latest
        run: |
          secretName=$(jq -r '.secretName' metadata.json)
          echo "secretName=$secretName" >> $GITHUB_OUTPUT 
          
      - name: setup dotnet + n3o cli
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          
      - name: Install and configure kubectl with AKS
        uses: n3oltd/actions/.github/actions/n3o-kubectl-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ inputs.data-region }}

      - id: decrypt-secrets
        name: Decrypt the secrets yml
        working-directory: ${{ inputs.data-region }}/postgres/${{ steps.get-deployment-version.outputs.deploymentVersion }}
        env:
          AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
          AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
          AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}
        run: |
          echo ${{ secrets[steps.get-secret-name.outputs.secretName] }}
          secretsYml=$(n3o utilities decrypt --path ./postgresSecrets.yaml --key ${{ secrets[steps.get-secret-name.outputs.secretName] }})
          echo $secretsYml > ./postgresSecretsDecrypted.yaml
              
      - name: Apply Secrets YAML to the cluster
        uses: n3oltd/actions/.github/actions/n3o-kubectl-apply-file@main
        with:
          file-name: postgresSecretsDecrypted.yaml
          working-directory: ${{ inputs.data-region }}/postgres/${{ steps.get-deployment-version.outputs.deploymentVersion }}
          replace-yaml: false
            
      - name: Apply YAML files to cluster
        uses: n3oltd/actions/.github/actions/n3o-kubectl-apply-files@main
        with:
          working-directory: ${{ inputs.data-region }}/postgres/${{ steps.get-deployment-version.outputs.deploymentVersion }}
          replace-yaml: false
