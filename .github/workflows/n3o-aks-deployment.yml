name: 'Deploy N3O services to AKS'

on:
  workflow_call:
    inputs:
      data-region:
        type: string
        required: true
        
      namespace:
        type: string
        required: true

      deployment-folder:
        type: string
        required: true

      sentry-project:
        type: string
        required: false
        default: ''

      sentry-environment:
        type: string
        required: false
        default: ''

jobs:
  deploy-to-aks:
    name: Deploy service to AKS

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ inputs.deployment-folder }}

      - id: latest-json-metadata
        name: Read latest JSON metadata
        working-directory: ${{ inputs.deployment-folder }}/latest
        run: |
          deploymentVersion=$(jq -r '.deploymentVersion' metadata.json)
          echo "deploymentVersion=$deploymentVersion" >> $GITHUB_OUTPUT
          
      - name: Install and configure kubectl with AKS
        uses: n3oltd/actions/.github/actions/n3o-kubectl-setup@main
        with:
          access-token: ${{ github.token }}
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ inputs.data-region }}

      - name: Apply YAML files to cluster
        uses: n3oltd/actions/.github/actions/n3o-kubectl-apply-files@main
        with:
          namespace: ${{ inputs.namespace }}
          working-directory: ${{ inputs.deployment-folder }}/${{ steps.latest-json-metadata.outputs.deploymentVersion }}

      - name: sentry deploy
        if: inputs.sentry-project != ''
        uses: n3oltd/actions/.github/actions/n3o-sentry-release@main
        with:
          project: ${{ inputs.sentry-project }}
          release: ${{ steps.latest-json-metadata.outputs.deploymentVersion }}
          environment: ${{ inputs.sentry-environment }}
          auth-token: ${{ secrets.SENTRY_AUTH_TOKEN }}
