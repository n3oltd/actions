# Deploys the platforms-pages release to AKS by applying its Kubernetes YAML manifests.
# Reads the latest deployment version from metadata, sets up kubectl, then applies the
# manifests for that version. Use to roll out platforms-pages to a cluster.
name: Deploy Platforms Pages

on:
  workflow_call:
    inputs:
      data-region:
        description: data residency region the deployment targets (e.g. eu1)
        type: string
        required: true

      environment-id:
        description: target environment/slot identifier under the deployment path
        type: string
        required: true

jobs:
  deploy-to-aks:
    name: Deploy to AKS

    runs-on: ubuntu-latest
    
    steps:
      - uses: actions/checkout@v6
        with:
          sparse-checkout: |
            ${{ inputs.data-region }}/platforms-pages/${{ inputs.environment-id }}
            
      - id: get-deployment-version
        name: Get Deployment Version
        working-directory: ${{ inputs.data-region }}/platforms-pages/${{ inputs.environment-id }}/latest
        run: |
          deploymentVersion=$(jq -r '.deploymentVersion' metadata.json)
          echo "deploymentVersion=$deploymentVersion" >> $GITHUB_OUTPUT
          
      - name: kubectl Setup
        uses: n3oltd/actions/.github/actions/n3o-kubectl-setup@main
        with:
          azure-credentials: ${{ secrets.AZURE_CREDENTIALS }}
          resource-group: ${{ inputs.data-region }}
          
      - name: Apply YAML
        uses: n3oltd/actions/.github/actions/n3o-kubectl-apply-files@main
        with:
          working-directory: ${{ inputs.data-region }}/platforms-pages/${{ inputs.environment-id }}/${{ steps.get-deployment-version.outputs.deploymentVersion }}
          replace-yaml: false
