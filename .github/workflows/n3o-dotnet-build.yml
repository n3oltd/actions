# Reusable workflow that checks out the repo and runs a .NET restore and build.
# Use it for CI on repos that only need to verify the solution compiles.
name: 'dotnet build'

on:
  workflow_call:
    inputs:
      build-configuration:
        type: string
        description: The build configuration to run
        default: Release
      
      working-directory:
        description: directory (relative to the repo root) to run the build/commands in
        type: string
        default: src

      mode:
        description: "runner mode: wait (self-hosted, free, queue) or fast (GitHub-hosted, immediate, billable). A [ci fast] commit marker forces fast."
        type: string
        default: wait

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  pick:
    uses: n3oltd/actions/.github/workflows/n3o-pick-runner.yml@main
    with:
      # Default wait (self-hosted, free); a [ci fast] commit marker opts a single build into hosted.
      mode: ${{ contains(github.event.head_commit.message, '[ci fast]') && 'fast' || inputs.mode }}
    secrets: inherit

  build:
    needs: pick
    runs-on: ${{ needs.pick.outputs.runs-on }}

    defaults:
      run:
        working-directory: ${{ inputs.working-directory }}

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - uses: n3oltd/actions/.github/actions/n3o-dotnet-setup@main

      - name: dotnet build
        uses: n3oltd/actions/.github/actions/dotnet-restore-build@main
        with:
          access-token: ${{ env.GH_PAT }}
          build-configuration: ${{ inputs.build-configuration }}
          working-directory: ${{ inputs.working-directory }}
          