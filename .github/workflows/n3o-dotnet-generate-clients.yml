# Reusable workflow that builds the solution, runs the n3o CLI to regenerate API
# clients, and commits any changes back to the repo. Use it to keep generated
# clients in sync on push (skipped when the commit message has [no-generate-clients]).
name: dotnet generate clients

on:
  workflow_call:
    inputs:
      working-directory:
        description: directory (relative to the repo root) to run the build/commands in
        type: string
        default: src

      fast:
        description: 'Fast: build on a GitHub-hosted runner (immediate, billable) instead of the self-hosted fleet (queued, free)'
        type: boolean
        default: false

env:
  AZURE_TENANT_ID: ${{ secrets.N3O_CLI_AZURE_TENANT_ID }}
  AZURE_CLIENT_ID: ${{ secrets.N3O_CLI_AZURE_CLIENT_ID }}
  AZURE_CLIENT_SECRET: ${{ secrets.N3O_CLI_AZURE_CLIENT_SECRET }}

jobs:
  generate:
    if: ${{ !contains(github.event.head_commit.message, '[no-generate-clients]') }}
    runs-on: ubuntu-latest
    concurrency:
      group: generate-clients-${{ github.ref }}
      cancel-in-progress: false

    steps:
      - name: app token
        id: app-token
        uses: actions/create-github-app-token@v2
        with:
          app-id: ${{ secrets.N3O_APP_ID }}
          private-key: ${{ secrets.N3O_APP_PRIVATE_KEY }}
          owner: n3oltd

      - name: checkout
        uses: actions/checkout@v6
        with:
          token: ${{ steps.app-token.outputs.token }}

      - name: setup-node
        uses: actions/setup-node@v6
        with:
          node-version: '24'

      - name: setup dotnet + n3o cli
        uses: n3oltd/actions/.github/actions/n3o-dotnet-cli-setup@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          azure-client-id: ${{ env.AZURE_CLIENT_ID }}
          azure-client-secret: ${{ env.AZURE_CLIENT_SECRET }}
          azure-tenant-id: ${{ env.AZURE_TENANT_ID }}

      - name: dotnet build
        uses: n3oltd/actions/.github/actions/dotnet-restore-build@main
        with:
          access-token: ${{ secrets.GH_PAT }}
          build-configuration: Debug
          working-directory: ${{ inputs.working-directory }}

      - name: generate clients
        working-directory: ${{ inputs.working-directory }}
        run: n3o generate clients

      - name: verify build
        working-directory: ${{ inputs.working-directory }}
        run: dotnet build --nologo

      - name: configure git identity
        uses: n3oltd/actions/.github/actions/n3o-git-identity@main

      - name: commit if changed
        run: |
          if git diff --quiet; then
            echo 'No client changes.'
            exit 0
          fi

          # Tagging the commit [ci fast] makes the downstream build it triggers run on a
          # GitHub-hosted runner (immediate, billable) instead of queueing on the self-hosted fleet.
          MSG='chore: generate clients [no-generate-clients]'
          if [ "${{ inputs.fast }}" = "true" ]; then MSG="$MSG [ci fast]"; fi

          git add -A
          git commit -m "$MSG"
          git push
