# Runs CI for a Vite project: typecheck, lint, optional tests, and a production build.
# Sets up Node with npm caching and installs via npm ci. Called by Vite app repos on push/PR.
name: 'vite ci'

on:
  workflow_call:
    inputs:
      node-version:
        description: Node.js version to set up
        type: string
        default: '24'

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: n3oltd/actions/.github/actions/n3o-node-setup@main
        with:
          node-version: ${{ inputs.node-version }}
          cache: npm

      - run: npm ci

      - run: npm run typecheck

      - run: npm run lint

      - run: npm test --if-present

      - run: npm run build
        env:
          NODE_ENV: production
