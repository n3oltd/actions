# Builds and publishes a Create React App project on the self-hosted React-App-Runner.
# Sets up Node, configures the GitHub npm registry, installs dependencies with sourcemaps
# and Sentry, then runs the production build. Called by React app repos to build releases.
name: react app build and publish

on:
  workflow_call:

env:
  GH_PAT: ${{ secrets.GH_PAT }}

jobs:
  build-publish:
    
    runs-on: React-App-Runner

    steps:
      - name: checkout
        uses: actions/checkout@v7

      - name: setup-node
        uses: n3oltd/actions/.github/actions/n3o-node-setup@main
        with:
          node-version: '14.x'

      - name: npm install and build
        run: |
          export GENERATE_SOURCEMAP=true
          export SENTRY_AUTH_TOKEN=${{ secrets.SENTRY_AUTH_TOKEN }}
          rm .npmrc          
          echo "//npm.pkg.github.com/:_authToken=${{ env.GH_PAT }}" >> .npmrc
          echo "@n3oltd:registry=https://npm.pkg.github.com" >> .npmrc
          cat .npmrc
          npm install -g react-scripts
          npm install -g react-app-rewired
          npm install
          #npm run test
          npm run build
        working-directory: ${{ github.workspace }}
